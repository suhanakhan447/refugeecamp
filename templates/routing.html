{% extends "base.html" %}
{% block content %}
<h2>Routing</h2>
<div class="row"><div class="col-md-4"><div class="card"><div class="card-body"><select id="start" class="form-control mb-2">{% for z in zones %}<option value="{{ z.zone_name }}">Zone {{ z.zone_name }}</option>{% endfor %}</select><select id="end" class="form-control mb-2">{% for z in zones %}<option value="{{ z.zone_name }}">Zone {{ z.zone_name }}</option>{% endfor %}</select><button class="btn btn-primary" onclick="findPath()">Find Shortest Path</button><div id="result" class="mt-3"></div></div></div></div><div class="col-md-8"><div class="card"><div class="card-body"><div id="graph" style="height: 400px;"></div></div></div></div></div>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
function findPath(){let s=document.getElementById('start').value,e=document.getElementById('end').value;fetch(`/api/shortest_path?start=${s}&end=${e}`).then(r=>r.json()).then(d=>{document.getElementById('result').innerHTML=`<div class="alert alert-success">Path: ${d.path.join(' → ')}<br>Distance: ${d.distance}m</div>`});}
fetch('/api/graph_data').then(r=>r.json()).then(d=>{let xs=[],ys=[],names=[];d.nodes.forEach(n=>{xs.push(n.x);ys.push(n.y);names.push(`Zone ${n.id}`)});let traces=[];d.edges.forEach(e=>{let f=d.nodes.find(n=>n.id===e.from),t=d.nodes.find(n=>n.id===e.to);if(f&&t)traces.push({x:[f.x,t.x],y:[f.y,t.y],mode:'lines',line:{width:2},showlegend:false})});traces.push({x:xs,y:ys,text:names,mode:'markers+text',marker:{size:40,color:'#1976d2'},textposition:'bottom center'});Plotly.newPlot('graph',traces,{title:'Camp Zones'})});
</script>
{% endblock %}
