{% extends "base.html" %}
{% block content %}
<h2>Emergency</h2>
<div class="row"><div class="col-md-4"><div class="card"><div class="card-header bg-danger text-white">New Emergency</div><div class="card-body"><form method="POST" action="/emergency/add"><select name="family_id" class="form-control mb-2">{% for f in families %}<option value="{{ f.id }}">{{ f.family_code }}</option>{% endfor %}</select><select name="emergency_type" class="form-control mb-2"><option>medical</option><option>food</option><option>water</option></select><select name="severity" class="form-control mb-2"><option value="1">High</option><option value="2">Medium</option><option value="3">Low</option></select><textarea name="description" class="form-control mb-2" placeholder="Description"></textarea><button type="submit" class="btn btn-danger">Send</button></form></div></div></div><div class="col-md-8"><div class="card"><div class="card-header">Active</div><div class="card-body"><table class="table">{% for e in emergencies %}<tr class="{% if e.severity == 1 %}table-danger{% endif %}"><td>{{ e.id }}</td><td>{{ e.emergency_type }}</td><td>{% if e.severity == 1 %}🔴 HIGH{% else %}🟡 MEDIUM{% endif %}</td><td>{{ e.status }}</td><td>{% if e.status == 'pending' %}<a href="/emergency/resolve/{{ e.id }}" class="btn btn-sm btn-success">Resolve</a>{% endif %}</td></tr>{% endfor %}</table></div></div></div></div>
{% endblock %}
