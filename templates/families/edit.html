{% extends "base.html" %}
{% block content %}
<h2>Edit Family</h2>
<form method="POST">
    <input type="text" name="head_name" class="form-control mb-2" value="{{ family.head_name }}" required>
    <input type="number" name="total_members" class="form-control mb-2" value="{{ family.total_members }}" required>
    <input type="number" name="children_count" class="form-control mb-2" value="{{ family.children_count }}">
    <input type="number" name="elderly_count" class="form-control mb-2" value="{{ family.elderly_count }}">
    <input type="text" name="camp_zone" class="form-control mb-2" value="{{ family.camp_zone }}">
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="/families" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
